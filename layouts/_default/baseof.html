<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="txn2 — open source components developed by Craig Johnston, sponsored by Deasil Works, Inc. and Plexara. Command-line tools, Go libraries, and Model Context Protocol servers.">
    <meta name="author" content="Craig Johnston">
    <meta property="og:title" content="{{ .Title }} — txn2">
    <meta property="og:description" content="Open source components developed by Craig Johnston, sponsored by Deasil Works, Inc. and Plexara.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ .Site.BaseURL }}">
    <meta name="twitter:card" content="summary_large_image">

    <title>{{ if not .IsHome }}{{ .Title }} · {{ end }}txn2 — open source components</title>

    <link rel="apple-touch-icon" sizes="180x180" href="{{ .Site.BaseURL }}images/icon/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ .Site.BaseURL }}images/icon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ .Site.BaseURL }}images/icon/favicon-16x16.png">
    <meta name="theme-color" content="#0B0B09">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..900,0..100;1,9..144,300..900,0..100&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ .Site.BaseURL }}css/site.css">
</head>
<body>

    <div class="grain" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>

    {{ block "main" . }}{{ end }}

    {{ partial "footer.html" . }}

    <script src="{{ .Site.BaseURL }}js/site.js" defer></script>
    {{ partial "analyticstracking.html" . }}
</body>
</html>
